app = "justbidit-api"
primary_region = "bom"  # Mumbai

[build]

[env]
  PORT = "8080"
  ACCESS_TOKEN_EXPIRE_MINUTES = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
